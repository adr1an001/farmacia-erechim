<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmácias Erechim | A Rede dos Melhores Preços</title>
    <link rel="stylesheet" href="css/resset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="cabecalho">
        <a href="./">
            <img class="cabecalho-imagem" src="assets/logo1.png" alt="Logo">
        </a>
        <nav class="menu">
            <a class="cabecalho-menu-item">Conheça nossas unidades</a>
            <a class="cabecalho-menu-item">Serviços</a>
            <a class="cabecalho-menu-item">Promoções</a>
            <a class="cabecalho-menu-item" href="https://www.instagram.com/farmaciaserechim/" target="_blank">Instagram</a>
        </nav>
    </header>

    <main class="conteudo">
        <section class="conteudo-principal">
            <div class="conteudo-principal-escrito">
                <h1 class="conteudo-principal-escrito-titulo">Farmácias Erechim</h1>
                <h2 class="conteudo-principal-escrito-subtitulo">A Rede dos melhores preços e prazos!</h2>
                <button id="botao-home" class="conteudo-principal-botao">Peça já!</button>
            </div>

            <div class="conteudo-principal-imagens">
                <img src="assets/farmacia-1.jfif" alt="farmácia 1">
            </div>
        </section>

        <section class="conteudo-secundario">
            <h3 class="conteudo-secundario-titulo">Por que escolher as Farmácias Erechim?</h3>
            <p class="conteudo-secundario-paragrafo">1. Preços inbatíveis</p>
            <p class="conteudo-secundario-paragrafo">2. Atendimento de qualidade.</p>
            <p class="conteudo-secundario-paragrafo">3. Há mais de 30 anos ajudando pessoas.</p>
        </section>
    </main>

    <footer class="rodape">
      <img class="rodape-imagem" src="assets/rodape.jfif">
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
